<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpsCenter Pro | Command Center</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { 
            --bg: #f8fafc; --sidebar: #0f172a; --accent: #2563eb; 
            --danger: #e11d48; --warning: #f59e0b; --success: #10b981;
            --card-border: #e2e8f0; --text-main: #1e293b; --text-muted: #64748b;
        }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text-main); margin: 0; }
        
        /* SIDEBAR */
        .sidebar { width: 280px; background: var(--sidebar); color: white; height: 100vh; padding: 2rem 1.2rem; position: fixed; z-index: 1000; display: flex; flex-direction: column; }
        .main { margin-left: 280px; padding: 2rem 4rem; }
        
        .btn-upload { background: var(--accent); border: none; border-radius: 10px; padding: 12px; font-weight: 700; width: 100%; color: white; cursor: pointer; text-align: center; display: block; margin-bottom: 10px; text-decoration: none;}
        .btn-batch { background: #475569; border: none; border-radius: 8px; padding: 10px; font-weight: 700; width: 100%; color: white; cursor: pointer; font-size: 0.75rem; text-align: center; display: block; margin-bottom: 10px; }
        .btn-save { background: var(--success); border: none; border-radius: 10px; padding: 10px; font-weight: 700; color: white; cursor: pointer; width: 100%; display: none; margin-bottom: 15px; }

        .sync-panel { display: flex; gap: 8px; margin-bottom: 20px; }
        .btn-sync { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; padding: 6px; color: #cbd5e1; flex: 1; font-size: 0.65rem; font-weight: 700; cursor: pointer; text-align: center; }

        /* FIXED SIDEBAR LAYOUT */
        .history-section { flex-grow: 1; overflow-y: auto; margin-top: 1rem; }
        .history-title { font-size: 0.55rem; font-weight: 800; color: rgba(255,255,255,0.4); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 15px; }
        .month-header { font-size: 0.7rem; font-weight: 800; color: white; text-transform: uppercase; padding: 12px; background: rgba(255,255,255,0.03); border-radius: 8px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; border: 1px solid rgba(255,255,255,0.05); }
        .month-content { display: none; padding-left: 5px; margin-bottom: 10px; }
        
        .history-badge-container { display: flex; align-items: center; gap: 10px; margin-bottom: 4px; padding-right: 5px; }
        .merge-checkbox { width: 16px; height: 16px; flex-shrink: 0; accent-color: var(--accent); cursor: pointer; border-radius: 4px; }
        .history-badge { 
            flex-grow: 1; background: transparent; border: none; color: #94a3b8; 
            padding: 8px 5px; border-radius: 6px; font-size: 0.7rem; text-align: left; 
            font-weight: 600; cursor: pointer; transition: all 0.2s; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .history-badge:hover { color: white; background: rgba(255,255,255,0.05); }
        .history-badge.active-badge { background: var(--accent); color: white; padding-left: 12px; }
        
        .bulk-action-row { display: flex; gap: 5px; }
        .btn-select-all, .btn-clear-all { background: transparent; border: 1px solid rgba(255,255,255,0.2); border-radius: 6px; color: #cbd5e1; font-size: 0.55rem; font-weight: 800; padding: 4px 6px; text-transform: uppercase; cursor: pointer; flex: 1; }

        /* KPI & GRID */
        .kpi-card { background: white; border: 1px solid var(--card-border); border-radius: 16px; padding: 1.5rem; height: 100%; position: relative; }
        .master-value { font-size: 3rem; font-weight: 800; color: var(--accent); letter-spacing: -0.05em; margin: 0.5rem 0; }
        .avg-pill { position: absolute; top: 1.25rem; right: 1.5rem; background: rgba(16, 185, 129, 0.1); color: var(--success); padding: 4px 10px; border-radius: 8px; font-weight: 800; font-size: 0.7rem; }
        .pill-label { font-size: 0.65rem; font-weight: 800; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; }
        .card-input { border: none; border-bottom: 1px dashed var(--card-border); font-weight: 700; width: 60px; text-align: right; background: transparent; outline: none; }

        /* DISPATCHER DETAIL */
        .contractor-pill { background: white; border: 1px solid var(--card-border); border-radius: 12px; margin-bottom: 15px; overflow: hidden; }
        .contractor-header { padding: 1.25rem 2rem; display: flex; align-items: center; cursor: pointer; }
        .contractor-name { font-weight: 700; font-size: 1.05rem; color: var(--accent); flex: 1; }
        .pill-group-right { display: flex; align-items: center; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 10px; padding: 5px 15px; gap: 20px; }
        .pill-stat { text-align: center; }
        .pill-label-drill { font-size: 0.55rem; font-weight: 800; color: var(--text-muted); text-transform: uppercase; display: block; margin-bottom: -2px; }
        .pill-val { font-size: 0.9rem; font-weight: 700; color: var(--text-main); }

        .contractor-details { display: none; padding: 0 1rem 1rem 1rem; }
        .detail-data-table { width: 100%; border-radius: 8px; overflow: hidden; font-size: 0.8rem; }
        .detail-data-table th { background: #e2e8f0; color: var(--text-muted); text-transform: uppercase; font-size: 0.6rem; font-weight: 800; padding: 10px 15px; }
        .detail-data-table td { background: white; border-top: 1px solid #f1f5f9; padding: 12px 15px; font-weight: 600; }

        /* EXCEPTIONS BREAKDOWN */
        .exception-card { background: #f8fafc; border: 1px solid var(--card-border); border-radius: 12px; margin-bottom: 8px; cursor: pointer; overflow: hidden; }
        .exception-header { padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; }
        .exception-details { display: none; padding: 10px 15px; background: white; border-top: 1px solid #f1f5f9; font-size: 0.75rem; }

        .nav-link { border: none !important; color: var(--text-muted); font-weight: 700; cursor: pointer; padding: 10px 20px; }
        .nav-link.active { color: var(--accent); border-bottom: 3px solid var(--accent) !important; background: transparent !important; }
        .search-container { background: white; border: 1px solid var(--card-border); border-radius: 12px; padding: 10px; margin-bottom: 2rem; display: flex; gap: 1rem; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2 class="fw-800 mb-4">OpsCenter</h2>
    <label class="btn-upload">Upload Report <input type="file" id="csvFile" accept=".csv" hidden></label>
    <label class="btn-batch">📂 Batch Auto-Split <input type="file" id="batchCsvFile" accept=".csv" hidden></label>
    <button id="saveBtn" class="btn-save" onclick="persistCurrentReport()">💾 Save to Archive</button>
    <div class="sync-panel">
        <button class="btn-sync" onclick="exportArchive()">📤 Export</button>
        <label class="btn-sync m-0">📥 Import <input type="file" id="importFile" accept=".json" hidden></label>
    </div>
    <div id="selectionPanel" style="display:none;" class="mb-3">
        <div class="d-flex gap-2">
            <button class="btn btn-warning btn-sm fw-bold w-100" onclick="mergeSelectedReports()">🔗 Merge</button>
            <button class="btn btn-danger btn-sm fw-bold w-100" onclick="deleteSelectedReports()">🗑️ Delete</button>
        </div>
    </div>
    <div class="history-section">
        <div class="d-flex justify-content-between align-items-center mb-2">
            <div class="history-title m-0">Archived Reports</div>
            <div class="bulk-action-row">
                <button class="btn-select-all" onclick="toggleSelectAll(true)">Select</button>
                <button class="btn-clear-all" onclick="toggleSelectAll(false)">Clear</button>
            </div>
        </div>
        <div id="historyBadges"></div>
    </div>
</div>

<div class="main">
    <header class="header-bar d-flex justify-content-between align-items-center mb-4">
        <h1 class="fw-800 mb-0">Financial Command</h1>
        <div class="d-flex align-items-center gap-3">
            <button class="btn btn-outline-primary btn-sm fw-bold" id="pdfBtn" onclick="downloadNativePDF()" style="display:none;">📄 Download PDF</button>
            <div id="datePill" class="badge bg-white text-primary border p-2 shadow-sm" style="display:none; border-radius: 8px;"><span id="periodValueText">--</span></div>
        </div>
    </header>

    <ul class="nav nav-tabs mb-4">
        <li class="nav-item"><a class="nav-link active" onclick="switchTab('command')" id="tab-dashboard">Dashboard</a></li>
        <li class="nav-item"><a class="nav-link" onclick="switchTab('details')" id="tab-details">Dispatcher Detail</a></li>
    </ul>

    <div id="view-command">
        <div class="row g-3 mb-4">
            <div class="col-xl-4"><div class="kpi-card shadow-sm"><span class="pill-label">Total Combined Cost</span><div class="master-value" id="totalCombinedCost">$0</div><span class="fw-700 text-muted small">Combined Avg: <span id="trueAvgCost" class="text-dark fw-800">$0</span> / Site</span></div></div>
            <div class="col-xl-4">
                <div class="row g-3 h-100">
                    <div class="col-12">
                        <div class="kpi-card shadow-sm">
                            <span class="pill-label">Fixed CTE Total</span>
                            <div class="avg-pill">Avg: <span id="faCostPerVisit">$0</span></div>
                            <div class="fw-800 fs-3 mt-1" id="mainCteDisplay">$0</div>
                            <div class="small text-muted d-flex gap-3 mt-1">
                                <span>Fleet: $<input type="number" id="inputFleet" class="card-input" value="2500" oninput="updateCalculations()"></span>
                                <span>Payroll: $<input type="number" id="inputPayroll" class="card-input" value="6319" oninput="updateCalculations()"></span>
                            </div>
                        </div>
                    </div>
                    <div class="col-12"><div class="kpi-card shadow-sm"><span class="pill-label">IC Job Pay</span><div class="avg-pill">Avg: <span id="icCostPerVisit">$0</span></div><div class="fw-800 fs-3 mt-1" id="totalIcPayments">$0</div></div></div>
                </div>
            </div>
            <div class="col-xl-4">
                <div class="row g-3 h-100">
                    <div class="col-12"><div class="kpi-card shadow-sm"><span class="pill-label">Unique Sites</span><div class="avg-pill" style="background:#f1f5f9; color:#64748b;" id="visitSplit">IC: 0 | FA: 0</div><div class="fw-800 fs-3 mt-1" id="uniqueVisits">0</div></div></div>
                    <div class="col-6"><div class="kpi-card shadow-sm" style="background:#fffbeb;"><span class="pill-label text-warning">Escalations</span><div class="fw-800 fs-3 mt-1 text-warning" id="escCount">0</div></div></div>
                    <div class="col-6"><div class="kpi-card shadow-sm" style="background:#fff1f2;"><span class="pill-label text-danger">Exceptions</span><div class="fw-800 fs-3 text-danger mt-1" id="exceptionTotal">0</div></div></div>
                </div>
            </div>
        </div>
        <div class="row g-4">
            <div class="col-lg-8 border-end"><table class="table align-middle small bg-white border rounded"><tbody id="ownerBody"></tbody></table></div>
            <div class="col-lg-4"><h6 class="fw-800 mb-3 text-muted small text-uppercase">Exception Breakdown</h6><div id="ex-summary"></div></div>
        </div>
    </div>

    <div id="view-details" style="display:none;">
        <div class="search-container shadow-sm">
            <input type="text" id="modernSearch" class="form-control border-0" placeholder="Search tech name or WO#..." onkeyup="applyFiltersAndSort()">
            <select id="modernSort" class="form-select border-0 w-25 fw-bold" onchange="applyFiltersAndSort()"><option value="pay-desc">Highest Pay</option><option value="sites-desc">Most Sites</option><option value="name-asc">Name A-Z</option></select>
        </div>
        <div id="contractorList"></div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.3.2/papaparse.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/lz-string/1.5.0/lz-string.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>

<script>
    let currentData = null, currentLabel = "";
    function getArchiveData() { try { let s = localStorage.getItem('opsArchive'); return s ? JSON.parse(LZString.decompressFromUTF16(s)) : {}; } catch(e) { return {}; } }
    function saveArchiveData(obj) { localStorage.setItem('opsArchive', LZString.compressToUTF16(JSON.stringify(obj))); }

    $(document).ready(() => { 
        loadFromStorage(); 
        updateCalculations();
        document.getElementById('importFile').addEventListener('change', e => { 
            const r = new FileReader(); 
            r.onload = ev => { try { const d = JSON.parse(ev.target.result); let arc = getArchiveData(); Object.assign(arc, d); saveArchiveData(arc); loadFromStorage(); } catch(err) { alert("Invalid import format."); } }; 
            r.readAsText(e.target.files[0]); 
        });
    });

    function updateCalculations() { if (currentData) processData(currentData); else { const f = parseFloat($('#inputFleet').val())||0, p = parseFloat($('#inputPayroll').val())||0; $('#mainCteDisplay').text(`$${(f+p).toLocaleString()}`); } }

    function getDispatcherName(str) {
        if (!str || str.trim() === "" || str.trim().toLowerCase() === "unassigned") return 'David Borochov';
        let clean = str.replace(/ Total/g, '').trim();
        if (clean.toUpperCase() === "FN" || clean.toUpperCase() === "FIELDNATION" || clean.includes("Field Nation")) return "Field Nation";
        if (clean.includes("Karen") || clean.includes("Yusep")) return "Karen Heiden";
        let people = clean.split(',').map(p => p.trim());
        if (people.length > 1) { const filtered = people.filter(p => !p.includes("Matt Shanks")); if (filtered.length > 0) people = filtered; }
        return people[people.length - 1] === "Unassigned" ? "David Borochov" : people[people.length-1]; 
    }

    function processData(data) {
        if (!data) return;
        const f = parseFloat($('#inputFleet').val())||0, p = parseFloat($('#inputPayroll').val())||0, cte = f+p;
        let icPay = 0, escTotal = 0;
        const ownerMap = { regular: {}, escalations: {} }, globalLocs = new Set(), icLocs = new Set(), faLocs = new Set(), contractorMap = {};
        const exMap = { "Venue Closed": {}, "Kiosk Missing": {}, "Refusal": {}, "Damaged": {} };

        data.forEach(row => {
            const ownerRaw = row['Owner']||""; if (ownerRaw === 'Grand Total') return;
            const dispatcher = getDispatcherName(ownerRaw);
            const vid = (row['VID'] || row['Address'] || "").toString().trim(); if (!vid) return;
            globalLocs.add(vid);
            const isFA = (row['IC/FA']||"").trim().toUpperCase() === "FA";
            const taskType = (row['task_type']||"").toLowerCase();
            const isEsc = (row['Escalation']||"").trim().toUpperCase() === "YES" || taskType.includes('escalation') || ownerRaw.includes("Matt Shanks");

            if (isFA) faLocs.add(vid);
            else {
                icLocs.add(vid);
                const rate = Math.round(parseFloat((row['SUM of Rate']||row['Rate']||"0").toString().replace(/[$,]/g, ''))) || 0;
                icPay += rate;
                const group = isEsc ? 'escalations' : 'regular';
                if (!ownerMap[group][dispatcher]) ownerMap[group][dispatcher] = { pay: 0, vids: new Set() };
                ownerMap[group][dispatcher].pay += rate; ownerMap[group][dispatcher].vids.add(vid);

                const assigned = (row['Assigned to']|| row['Technician'] || "").trim();
                const wo = (row['Work Order Number']|| row['WO #'] || '--').toString().trim();
                if (assigned && assigned.toLowerCase() !== 'unassigned') {
                    if (!contractorMap[assigned]) contractorMap[assigned] = { dispatcher, pay: 0, vids: new Set(), jobs: {} };
                    contractorMap[assigned].pay += rate; contractorMap[assigned].vids.add(vid);
                    if (!contractorMap[assigned].jobs[wo]) contractorMap[assigned].jobs[wo] = { rate: 0, stops: new Set() };
                    contractorMap[assigned].jobs[wo].rate += rate; contractorMap[assigned].jobs[wo].stops.add(vid);
                }
            }
            const reason = row['Exception Reason'], venue = row['Venue Name'] || "Unknown";
            if (reason && reason !== "Pending") {
                let rKey = null; const lowR = reason.toLowerCase();
                if (lowR.includes("closed")) rKey = "Venue Closed"; else if (lowR.includes("missing")) rKey = "Kiosk Missing"; else if (lowR.includes("refusal") || lowR.includes("refused")) rKey = "Refusal"; else if (lowR.includes("damaged")) rKey = "Damaged";
                if (rKey) { if (!exMap[rKey][venue]) exMap[rKey][venue] = 0; exMap[rKey][venue]++; }
            }
            if (isEsc) escTotal++;
        });

        const combined = cte + icPay;
        $("#totalCombinedCost").text(`$${combined.toLocaleString()}`);
        $("#trueAvgCost").text(`$${Math.round(combined/(globalLocs.size||1)).toLocaleString()}`);
        $("#mainCteDisplay").text(`$${cte.toLocaleString()}`);
        $("#totalIcPayments").text(`$${icPay.toLocaleString()}`);
        $("#uniqueVisits").text(globalLocs.size);
        $("#visitSplit").text(`IC: ${icLocs.size} | FA: ${faLocs.size}`);
        $("#escCount").text(escTotal);
        $("#icCostPerVisit").text(`$${(icLocs.size>0 ? Math.round(icPay/icLocs.size) : 0)}`);
        $("#faCostPerVisit").text(`$${(faLocs.size>0 ? Math.round(cte/faLocs.size) : 0)}`);

        let oHtml = "", rS = 0, rP = 0, eS = 0, eP = 0, pdfR = [], pdfE = [];
        oHtml += `<tr><td colspan="4" class="bg-light fw-bold text-uppercase small py-2 px-3">Regular Routes</td></tr>`;
        Object.entries(ownerMap.regular).sort((a,b)=>b[1].pay-a[1].pay).forEach(([n, d]) => {
            const pStr = '$'+d.pay.toLocaleString(), aStr = '$'+Math.round(d.pay/d.vids.size).toLocaleString();
            oHtml += `<tr><td class="ps-3">${n}</td><td class="text-center">${d.vids.size}</td><td class="text-primary fw-bold">${pStr}</td><td>${aStr}</td></tr>`;
            pdfR.push([n, d.vids.size.toString(), pStr, aStr]);
            rS += d.vids.size; rP += d.pay;
        });
        oHtml += `<tr class="fw-bold table-light text-primary"><td>Regular Subtotal:</td><td class="text-center">${rS}</td><td>$${rP.toLocaleString()}</td><td>$${Math.round(rP/(rS||1)).toLocaleString()}</td></tr>`;
        oHtml += `<tr><td colspan="4" class="bg-light fw-bold text-uppercase small py-2 px-3">Escalations & Rollouts</td></tr>`;
        Object.entries(ownerMap.escalations).sort((a,b)=>b[1].pay-a[1].pay).forEach(([n, d]) => {
            const pStr = '$'+d.pay.toLocaleString(), aStr = '$'+Math.round(d.pay/d.vids.size).toLocaleString();
            oHtml += `<tr><td class="ps-3">${n}</td><td class="text-center">${d.vids.size}</td><td class="text-primary fw-bold">${pStr}</td><td>${aStr}</td></tr>`;
            pdfE.push([n, d.vids.size.toString(), pStr, aStr]);
            eS += d.vids.size; eP += d.pay;
        });
        oHtml += `<tr class="fw-bold table-secondary"><td>GRAND TOTAL:</td><td class="text-center">${rS+eS}</td><td>$${(rP+eP).toLocaleString()}</td><td>$${Math.round((rP+eP)/((rS+eS)||1)).toLocaleString()}</td></tr>`;
        $("#ownerBody").html(oHtml);

        let exHtml = "", pdfEx = [];
        Object.entries(exMap).forEach(([reason, venues]) => {
            const count = Object.values(venues).reduce((a,b)=>a+b, 0);
            pdfEx.push([reason, count.toString()]);
            exHtml += `<div class="exception-card shadow-sm" onclick="$(this).find('.exception-details').slideToggle(150)"><div class="exception-header"><b>${reason}</b><span class="badge bg-danger rounded-pill">${count}</span></div><div class="exception-details">${Object.entries(venues).map(([v,c])=>`<div class="d-flex justify-content-between py-1 border-bottom"><span>${v}</span><b>${c}</b></div>`).join('')}</div></div>`;
        });
        $("#ex-summary").html(exHtml);
        window.pdfExportData = { combined: $("#totalCombinedCost").text(), combinedAvg: "Avg: "+$("#trueAvgCost").text()+"/Site", cte: $("#mainCteDisplay").text(), cteDetails: "Fleet: $"+f.toLocaleString()+" | Payroll: $"+p.toLocaleString(), ic: $("#totalIcPayments").text(), icAvg: "Avg: "+$("#icCostPerVisit").text()+"/Site", sites: globalLocs.size.toString(), icFaSplit: "IC: "+icLocs.size+" | FA: "+faLocs.size, esc: escTotal.toString(), exTotal: Object.values(exMap).reduce((a,v)=>a+Object.values(v).reduce((x,y)=>x+y,0),0).toString(), regular: pdfR, regSub: ["Regular Subtotal:", rS.toString(), "$"+rP.toLocaleString(), "$"+Math.round(rP/(rS||1)).toLocaleString()], escalation: pdfE, escSub: ["Escalations Subtotal:", eS.toString(), "$"+eP.toLocaleString(), "$"+Math.round(eP/(eS||1)).toLocaleString()], grandTotal: ["GRAND TOTAL:", (rS+eS).toString(), "$"+(rP+eP).toLocaleString(), "$"+Math.round((rP+eP)/((rS+eS)||1)).toLocaleString()], exceptions: pdfEx };
        
        let pillHtml = "";
        Object.entries(contractorMap).sort((a,b)=>b[1].pay-a[1].pay).forEach(([name, stats]) => {
            pillHtml += `<div class="contractor-pill contractor-item-wrapper" data-name="${name.toLowerCase()}" data-wos="${Object.keys(stats.jobs).join(' ').toLowerCase()}" data-pay="${stats.pay}" data-sites="${stats.vids.size}"><div class="contractor-header" onclick="$(this).next().slideToggle(150)"><div class="contractor-name">${name}</div><div class="pill-group-right shadow-sm"><div class="pill-stat"><span class="pill-label-drill">Sites</span><span class="pill-val">${stats.vids.size}</span></div><div class="pill-stat"><span class="pill-label-drill">Pay</span><span class="pill-val text-primary">$${stats.pay.toLocaleString()}</span></div><div class="pill-stat"><span class="pill-label-drill">Avg</span><span class="pill-val">$${Math.round(stats.pay/(stats.vids.size||1)).toLocaleString()}</span></div></div></div><div class="contractor-details"><table class="table detail-data-table mb-0 shadow-sm border"><thead><tr><th>Work Order #</th><th class="text-center"># of Stops</th><th class="text-end">Sum of Rate</th><th class="text-end">Avg / Stop</th></tr></thead><tbody>${Object.entries(stats.jobs).map(([wo, j])=>`<tr><td class="text-primary">${wo}</td><td class="text-center">${j.stops.size}</td><td class="text-end">$${j.rate.toLocaleString()}</td><td class="text-end fw-bold">$${Math.round(j.rate/(j.stops.size||1)).toLocaleString()}</td></tr>`).join('')}</tbody></table></div></div>`;
        });
        $("#contractorList").html(pillHtml);
    }

    function applyFiltersAndSort() {
        const term = $('#modernSearch').val().toLowerCase(), sort = $('#modernSort').val(), items = $('.contractor-item-wrapper').get();
        items.sort((a,b) => { if(sort === 'pay-desc') return b.dataset.pay - a.dataset.pay; if(sort === 'sites-desc') return b.dataset.sites - a.dataset.sites; return a.dataset.name.localeCompare(b.dataset.name); });
        items.forEach(item => { $(item).toggle(!term || item.dataset.name.includes(term) || item.dataset.wos.includes(term)); $('#contractorList').append(item); });
    }

    function toggleSelectAll(state) { $('.merge-checkbox').prop('checked', state); checkSelectionState(); }

    function loadFromStorage() {
        const arc = getArchiveData(), grouped = {}, mF = ["JANUARY","FEBRUARY","MARCH","APRIL","MAY","JUNE","JULY","AUGUST","SEPTEMBER","OCTOBER","NOVEMBER","DECEMBER"];
        Object.keys(arc).forEach(l => {
            let found = "OTHER REPORTS"; const up = l.toUpperCase();
            mF.forEach(m => { if (up.includes(m) || up.includes(m.substring(0,3))) { const year = up.match(/\d{4}/); if (year) found = m + " " + year[0]; } });
            if(!grouped[found]) grouped[found] = []; grouped[found].push(l);
        });
        let html = "";
        Object.entries(grouped).sort((a,b) => { if(a[0]==="OTHER REPORTS") return 1; if(b[0]==="OTHER REPORTS") return -1; return new Date(b[0])-new Date(a[0]); }).forEach(([month, labels]) => {
            const gid = month.replace(/\s/g, '');
            labels.sort((a,b) => { let d1 = parseDateSafe(a.split('-')[0]), d2 = parseDateSafe(b.split('-')[0]); return d2 - d1; });
            html += `<div class="month-header" onclick="$('#${gid}').slideToggle(150)">${month} <span>▼</span></div><div class="month-content" id="${gid}">${labels.map(l => `<div class="history-badge-container"><input type="checkbox" class="merge-checkbox" value="${l}" onchange="checkSelectionState()"><button class="history-badge ${l===currentLabel?'active-badge':''}" onclick="loadArchivedReport('${l}', this)">${l}</button></div>`).join('')}</div>`;
        });
        $("#historyBadges").html(html);
    }

    function parseDateSafe(s) { if (!s) return null; let d = new Date(s.trim()); if (isNaN(d.getTime())) { let p = s.split('/'); if (p.length === 3) d = new Date(`${p[2]}-${p[0]}-${p[1]}`); } return isNaN(d.getTime()) ? null : d; }

    function mergeSelectedReports() {
        const arc = getArchiveData(); let m = [], dates = [];
        $('.merge-checkbox:checked').each(function() { const l = $(this).val(); if (arc[l]) { m = m.concat(arc[l]); arc[l].forEach(row => { let d = parseDateSafe(row['Date Visited']||row['Visit Date']); if(d) dates.push(d); }); } });
        if (m.length > 0) {
            currentData = m; if(dates.length > 0) { dates.sort((a,b)=>a-b); const start = dates[0].toLocaleDateString(undefined, {month:'short', day:'numeric'}); const end = dates[dates.length-1].toLocaleDateString(undefined, {month:'short', day:'numeric'}); currentLabel = `${start} - ${end}, ${dates[dates.length-1].getFullYear()}`; } else { currentLabel = "Merged Report"; }
            processData(m); $('#saveBtn').show();
        }
    }

    function deleteSelectedReports() { if (!confirm("Delete selected?")) return; let arc = getArchiveData(); $('.merge-checkbox:checked').each(function() { delete arc[$(this).val()]; }); saveArchiveData(arc); loadFromStorage(); }
    function loadArchivedReport(l, btn) { currentData = getArchiveData()[l]; currentLabel = l; processData(currentData); $('.history-badge').removeClass('active-badge'); $(btn).addClass('active-badge'); $('#saveBtn').hide(); $('#pdfBtn, #datePill').show(); $('#periodValueText').text(l); }
    function persistCurrentReport() { let arc = getArchiveData(); arc[currentLabel] = currentData; saveArchiveData(arc); loadFromStorage(); $('#saveBtn').hide(); }
    function checkSelectionState() { $('#selectionPanel').toggle($('.merge-checkbox:checked').length > 0); }
    function switchTab(t) { $('.nav-link').removeClass('active'); if(t==='command') { $('#view-command').show(); $('#view-details').hide(); $('#tab-dashboard').addClass('active'); } else { $('#view-command').hide(); $('#view-details').show(); $('#tab-details').addClass('active'); } }

    function downloadNativePDF() {
        const { jsPDF } = window.jspdf; const doc = new jsPDF('p', 'pt', 'letter'); const d = window.pdfExportData;
        doc.setFontSize(22); doc.setTextColor(15,23,42); doc.setFont("helvetica", "bold"); doc.text("OpsCenter Financial Overview", 40, 50); doc.setFontSize(12); doc.setTextColor(100); doc.setFont("helvetica", "normal"); doc.text(currentLabel, 40, 70);
        doc.autoTable({ startY: 90, head: [['Total Combined Cost', 'Fixed CTE Total', 'IC Job Pay']], body: [[d.combined, d.cte, d.ic], [d.combinedAvg, d.cteDetails, d.icAvg]], theme: 'grid', styles: {fontSize: 9}, didParseCell: function(data) { if(data.row.index === 0) { data.cell.styles.fontSize = 18; data.cell.styles.fontStyle = 'bold'; } } });
        doc.autoTable({ startY: doc.lastAutoTable.finalY + 15, head: [['Unique Sites', 'Escalations', 'Exceptions']], body: [[d.sites, d.esc, d.exTotal], [d.icFaSplit, '', '']], theme: 'grid', styles: {fontSize: 9}, didParseCell: function(data) { if(data.row.index === 0) { data.cell.styles.fontSize = 18; data.cell.styles.fontStyle = 'bold'; } } });
        let body = [[{content: 'REGULAR ROUTES', colSpan: 4, styles: {fillColor: [240,240,240], fontStyle: 'bold'}}]];
        body = body.concat(d.regular); body.push([{content: d.regSub[0], styles: {fontStyle: 'bold'}}, d.regSub[1], d.regSub[2], d.regSub[3]]);
        body.push([{content: 'ESCALATIONS & ROLLOUTS', colSpan: 4, styles: {fillColor: [240,240,240], fontStyle: 'bold'}}]);
        body = body.concat(d.escalation); body.push([{content: d.escSub[0], styles: {fontStyle: 'bold'}}, d.escSub[1], d.escSub[2], d.escSub[3]]);
        body.push([{content: d.grandTotal[0], styles: {fillColor: [230,230,230], fontStyle: 'bold'}}, d.grandTotal[1], d.grandTotal[2], d.grandTotal[3]]);
        doc.autoTable({ startY: doc.lastAutoTable.finalY + 30, margin: {right: 230}, head: [['Dispatcher', 'Sites', 'Total Pay', 'Avg / Site']], body, theme: 'grid', styles: {fontSize: 8} });
        doc.autoTable({ startY: doc.lastAutoTable.finalY - (body.length * 12.5) - 22, margin: {left: 410}, head: [['Exception Reason', 'Count']], body: d.exceptions, theme: 'grid', styles: {fontSize: 8} });
        doc.save(`OpsCenter_Overview_${currentLabel.replace(/\s/g, '_')}.pdf`);
    }

    document.getElementById('csvFile').addEventListener('change', e => { Papa.parse(e.target.files[0], { header: true, complete: r => { currentData = r.data; currentLabel = e.target.files[0].name.replace('.csv',''); processData(r.data); $('#saveBtn, #pdfBtn, #datePill').show(); $('#periodValueText').text(currentLabel); }}); });
    document.getElementById('batchCsvFile').addEventListener('change', e => { Papa.parse(e.target.files[0], { header: true, complete: r => {
        let arc = getArchiveData();
        r.data.forEach(row => {
            let d = parseDateSafe(row['Date Visited']||row['Visit Date']); if(!d) return;
            let s = new Date(d); s.setDate(s.getDate() - s.getDay() + (s.getDay()===0?-6:1)); let ed = new Date(s); ed.setDate(s.getDate()+6);
            let l = `${s.toLocaleDateString(undefined, {month:'short', day:'numeric'})} - ${ed.toLocaleDateString(undefined, {month:'short', day:'numeric'})}, ${ed.getFullYear()}`;
            if(!arc[l]) arc[l] = []; arc[l].push(row);
        }); saveArchiveData(arc); loadFromStorage(); alert("Batch split complete.");
    }}); });
    function exportArchive() { const arc = getArchiveData(); if (Object.keys(arc).length === 0) return; const blob = new Blob([JSON.stringify(arc)], {type: "application/json"}); const url = URL.createObjectURL(blob); const a = document.createElement('a'); a.href = url; a.download = `OpsCenter_Archive_${new Date().toISOString().split('T')[0]}.json`; a.click(); }
</script>
</body>
</html>
